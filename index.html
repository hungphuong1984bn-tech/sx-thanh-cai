<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e40af">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SX Thanh Cái">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>Quản Lý Sản Xuất — Đông Phương</title>
<style>
/* ═══════ RESET & BASE ═══════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#1e40af;--blue-light:#dbeafe;--blue-mid:#3b82f6;
  --green:#065f46;--green-light:#d1fae5;--green-mid:#10b981;
  --amber:#92400e;--amber-light:#fef3c7;--amber-mid:#f59e0b;
  --red:#991b1b;--red-light:#fee2e2;--red-mid:#ef4444;
  --purple:#5b21b6;--purple-light:#ede9fe;
  --text:#0f172a;--text2:#334155;--text3:#64748b;--text4:#94a3b8;
  --bg:#f1f5f9;--surface:#ffffff;--border:#e2e8f0;--border2:#cbd5e1;
  --radius:14px;--radius-sm:10px;--radius-xs:7px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
  --shadow-lg:0 10px 25px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
  --nav-h:64px;--topbar-h:60px;--sidebar-w:260px;
}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;overscroll-behavior:none;-webkit-font-smoothing:antialiased}

/* ═══════ SCREENS ═══════ */
.screen{display:none;height:100vh;flex-direction:column}
.screen.active{display:flex}

/* ═══════ LOGIN ═══════ */
#loginScreen{background:linear-gradient(135deg,#1e3a8a 0%,#1e40af 40%,#2563eb 80%,#3b82f6 100%);justify-content:center;align-items:center;padding:20px;position:relative;overflow:hidden}
#loginScreen::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.login-card{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:380px;box-shadow:var(--shadow-lg);position:relative;z-index:1}
.login-brand{text-align:center;margin-bottom:28px}
.login-icon{width:68px;height:68px;background:linear-gradient(135deg,#1e40af,#3b82f6);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:30px;box-shadow:0 8px 20px rgba(30,64,175,.35)}
.login-brand h1{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.login-brand p{font-size:12.5px;color:var(--text3);margin-top:3px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
.field input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;color:var(--text);background:#fff;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus{border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
#loginErr{display:none;font-size:12.5px;color:var(--red);background:var(--red-light);padding:8px 12px;border-radius:8px;margin-bottom:14px;border-left:3px solid var(--red-mid)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.2px}
.login-btn:active{opacity:.9;transform:scale(.98)}
.login-btn:disabled{opacity:.6}
.demo-box{margin-top:16px;background:#f8fafc;border-radius:10px;padding:12px 14px;border:1.5px solid var(--border)}
.demo-box-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.demo-row{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;margin-bottom:4px}
.demo-row:last-child{margin-bottom:0}
.demo-label{color:var(--text2);font-weight:500}
.demo-cred{font-family:monospace;background:#e2e8f0;padding:2px 7px;border-radius:5px;font-size:12px;color:var(--blue);cursor:pointer}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .4s ease-in-out}

/* ═══════ APP LAYOUT ═══════ */
#appScreen{position:relative;overflow:hidden}
.app-body{display:flex;flex:1;overflow:hidden;height:calc(100vh - var(--topbar-h))}

/* ═══════ TOPBAR ═══════ */
.topbar{height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:200;position:relative}
.topbar-menu-btn{width:38px;height:38px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--text2);transition:background .15s}
.topbar-menu-btn:hover{background:var(--bg)}
.topbar-menu-btn svg{width:20px;height:20px;stroke-width:2}
.topbar-title{font-size:17px;font-weight:700;color:var(--text);flex:1;letter-spacing:-.2px}
.topbar-right{display:flex;align-items:center;gap:8px}
.avatar-btn{width:38px;height:38px;border-radius:50%;border:none;background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:box-shadow .2s}
.avatar-btn:hover{box-shadow:0 0 0 3px rgba(59,130,246,.25)}
.notif-btn{width:38px;height:38px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--text3);transition:background .15s;position:relative}
.notif-btn:hover{background:var(--bg)}
.notif-btn svg{width:20px;height:20px;stroke-width:1.8}

/* ═══════ SIDEBAR ═══════ */
.sidebar{width:var(--sidebar-w);height:100%;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:transform .25s cubic-bezier(.4,0,.2,1)}
.sidebar-profile{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.sidebar-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1e40af,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;margin-bottom:10px;overflow:hidden;flex-shrink:0}
.sidebar-name{font-size:14px;font-weight:700;color:var(--text)}
.sidebar-role{font-size:12px;color:var(--text3);margin-top:2px}
.sidebar-nav{padding:8px 0;flex:1}
.nav-section-lbl{font-size:10.5px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.8px;padding:12px 16px 4px}
.nav-link{display:flex;align-items:center;gap:12px;padding:10px 16px;border:none;background:none;cursor:pointer;width:100%;text-align:left;border-radius:0;color:var(--text2);font-size:14px;font-weight:500;font-family:inherit;transition:background .12s;position:relative}
.nav-link svg{width:20px;height:20px;stroke-width:1.8;flex-shrink:0;color:var(--text3)}
.nav-link:hover{background:#f8fafc}
.nav-link.active{background:var(--blue-light);color:var(--blue);font-weight:600}
.nav-link.active svg{color:var(--blue)}
.nav-link.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--blue);border-radius:0 3px 3px 0}
.nav-badge{margin-left:auto;background:var(--red-mid);color:#fff;border-radius:10px;font-size:9.5px;font-weight:700;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.sidebar-logout{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-xs);border:none;background:none;cursor:pointer;width:100%;color:var(--red);font-size:13.5px;font-weight:600;font-family:inherit;transition:background .12s}
.sidebar-logout:hover{background:var(--red-light)}
.sidebar-logout svg{width:18px;height:18px;stroke-width:2}

/* ═══════ SIDEBAR OVERLAY (mobile) ═══════ */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:190;backdrop-filter:blur(2px)}
.sidebar-overlay.open{display:block}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;height:100%;z-index:195;transform:translateX(-100%);border-right:none;box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:translateX(0)}
  .app-body{height:calc(100vh - var(--topbar-h) - var(--nav-h))}
}
@media(min-width:769px){
  .topbar-menu-btn{display:none}
  .sidebar{display:flex!important;transform:none!important}
  .sidebar-overlay{display:none!important}
  /* No bottom nav on desktop */
  .bottom-nav{display:none!important}
  .app-body{height:calc(100vh - var(--topbar-h))}
}

/* ═══════ BOTTOM NAV (mobile) ═══════ */
.bottom-nav{height:var(--nav-h);background:#fff;border-top:1px solid var(--border);display:flex;flex-shrink:0;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;font-family:inherit;padding:6px 0;position:relative;transition:color .12s}
.bn-item.active{color:var(--blue)}
.bn-item svg{width:23px;height:23px;stroke-width:1.7}
.bn-badge{position:absolute;top:5px;right:calc(50% - 18px);background:var(--red-mid);color:#fff;border-radius:10px;font-size:9px;font-weight:700;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* ═══════ MAIN CONTENT ═══════ */
.main-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);position:relative}
.page-content{padding:16px;display:flex;flex-direction:column;gap:14px}
@media(min-width:769px){.page-content{padding:20px;max-width:960px;margin:0 auto;gap:16px}}

/* ═══════ TOOLBAR (search+chips) ═══════ */
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:80}
.search-wrap{position:relative;margin-bottom:10px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke-width:2;color:var(--text4)}
.search-inp{width:100%;padding:10px 36px 10px 36px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--text);background:#f8fafc;outline:none;transition:all .2s}
.search-inp:focus{background:#fff;border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;color:var(--text4);font-size:15px;line-height:1;padding:3px}
.chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap;background:#fff;color:var(--text3);transition:all .12s;flex-shrink:0}
.chip b{font-weight:700;margin-left:3px}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip.on b{color:rgba(255,255,255,.85)}
.chip.running.on{background:#eff6ff;color:#1e40af;border-color:#93c5fd}
.chip.wait.on{background:#fefce8;color:#92400e;border-color:#fde047}
.chip.done.on{background:#f0fdf4;color:#065f46;border-color:#86efac}
.chip.prio.on{background:var(--purple-light);color:var(--purple);border-color:#a78bfa}

/* ═══════ KPI BAR ═══════ */
.kpi-bar{display:flex;align-items:center;background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;gap:0}
.kpi-item{text-align:center;flex:1}
.kpi-v{display:block;font-size:19px;font-weight:800;color:var(--text);line-height:1}
.kpi-v.amber{color:var(--amber-mid)}
.kpi-v.green{color:var(--green-mid)}
.kpi-l{display:block;font-size:10px;color:var(--text4);margin-top:2px;font-weight:500}
.kpi-div{width:1px;background:var(--border);align-self:stretch;margin:0 4px}
.kpi-prog{flex:2;padding-left:12px}

/* ═══════ STATS GRID ═══════ */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px}
.stat-icon{font-size:24px;line-height:1;flex-shrink:0}
.stat-body{}
.stat-val{font-size:26px;font-weight:800;line-height:1;color:var(--text)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500}
.stat-card.blue .stat-val{color:var(--blue)}
.stat-card.green .stat-val{color:var(--green-mid)}
.stat-card.amber .stat-val{color:var(--amber-mid)}
.stat-card.red .stat-val{color:var(--red-mid)}

/* ═══════ CARD ═══════ */
.card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.card-title{font-size:12.5px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.badge-pct{font-size:13px;font-weight:800;padding:3px 10px;border-radius:20px}
.badge-pct.green{background:var(--green-light);color:var(--green)}
.badge-pct.amber{background:var(--amber-light);color:var(--amber)}
.badge-pct.red{background:var(--red-light);color:var(--red)}

/* ═══════ PROGRESS ═══════ */
.prog-wrap{margin-top:4px}
.prog-track{background:var(--border);border-radius:4px;height:8px;overflow:hidden}
.prog-track.sm{height:5px}
.prog-fill{height:100%;border-radius:4px;background:var(--blue-mid);transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-fill.green{background:var(--green-mid)}
.prog-info{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:5px}

/* ═══════ CUSTOMER TABLE ═══════ */
.cust-table{overflow:hidden}
.ct-head{display:grid;grid-template-columns:2fr 80px 70px 1fr;gap:8px;padding:6px 10px;font-size:10.5px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);margin:-4px -4px 0}
.ct-row{display:grid;grid-template-columns:2fr 80px 70px 1fr;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:background .12s;align-items:center;margin:0 -4px}
.ct-row:hover{background:#f8fafc}
.ct-name{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.ct-count{font-size:12.5px;color:var(--text2);}
.ct-count b{font-weight:700;color:var(--text)}
.ct-prog{display:flex;align-items:center;gap:6px}
.ct-pct{font-size:11.5px;font-weight:700;color:var(--text2);min-width:32px;text-align:right}
.ct-pct.green{color:var(--green-mid)}
.running-dot{width:7px;height:7px;border-radius:50%;background:var(--amber-mid);display:inline-block;animation:pulse 2s infinite}
.running-badge{font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;background:#fef3c7;color:#92400e}

/* ═══════ ORDER CARD ═══════ */
.order-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border)}
.order-card.completed{opacity:.8}
.oc-top{padding:14px 14px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.oc-customer{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.oc-spec{font-size:12.5px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.oc-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px 12px;border-top:1px solid var(--border)}
@media(min-width:480px){.oc-meta{grid-template-columns:repeat(4,auto)}}
.oc-meta-item{padding-top:8px}
.meta-lbl{display:block;font-size:10px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.meta-val{display:block;font-size:13.5px;font-weight:700;color:var(--text2)}
.meta-val.blue{color:var(--blue)}
.oc-note{padding:0 14px 10px;font-size:12px;color:#92400e;background:#fef9ee;border-top:1px solid #fde68a}
.oc-actions{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
.abtn{padding:8px 14px;border-radius:var(--radius-xs);border:1.5px solid var(--border);font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;background:#fff;color:var(--text2);transition:all .12s;white-space:nowrap}
.abtn:active{transform:scale(.97)}
.abtn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.abtn.secondary{background:#f1f5f9;border-color:var(--border);color:var(--text2)}
.abtn.success{background:var(--green-mid);color:#fff;border-color:var(--green-mid)}
.abtn.danger{background:var(--red-mid);color:#fff;border-color:var(--red-mid)}
.abtn.icon-only{padding:8px 11px}
.abtn.full{flex:1}
.badge-done-chip{font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;background:var(--green-light);color:var(--green);white-space:nowrap}

/* ═══════ GROUP BLOCK (keHoach) ═══════ */
.group-block{margin-bottom:20px}
.group-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px}
.group-hd-left{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.group-name{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.2px}
.group-hd-right{text-align:right;flex-shrink:0}
.group-pct{font-size:15px;font-weight:800;color:var(--text)}
.group-pct.green{color:var(--green-mid)}
.group-count{font-size:11px;color:var(--text3)}
.group-items{background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border)}

.kh-row{padding:12px 14px;border-bottom:1px solid var(--border)}
.kh-row.last{border-bottom:none}
.kh-row-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.kh-spec-block{}
.kh-dim{display:block;font-size:14.5px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-.2px;margin-bottom:5px}
.kh-tags{display:flex;gap:4px;flex-wrap:wrap}
.kh-nums{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.kh-num-item{}
.kh-num-lbl{display:block;font-size:9.5px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.kh-num-val{display:block;font-size:15px;font-weight:800;color:var(--text)}
.kh-num-val.blue{color:var(--blue)}
.kh-note{font-size:11.5px;color:#92400e;background:#fef9ee;padding:5px 9px;border-radius:7px;margin-bottom:8px;border:1px solid #fde68a}
.kh-status-btns{display:flex;gap:6px}
.ksb{flex:1;padding:8px 4px;border-radius:9px;border:1.5px solid var(--border);background:#f8fafc;color:var(--text3);font-size:11.5px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .12s;white-space:nowrap;text-align:center}
.ksb.active{font-weight:700}
.ksb:active{transform:scale(.96)}
.group-footer{padding:9px 14px;background:#f8fafc;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border)}
.gf-lbl{font-size:11.5px;color:var(--text3);font-weight:500}
.gf-right{display:flex;gap:10px}
.gf-kg{font-size:12px;font-weight:700;color:var(--blue)}
.gf-done{font-size:12px;font-weight:700;color:var(--green-mid)}

/* ═══════ SUMMARY BAR ═══════ */
.summary-bar{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:0}
.sb-item{flex:1;text-align:center}
.sb-v{display:block;font-size:20px;font-weight:800;color:var(--text);line-height:1}
.sb-v.green{color:var(--green-mid)}
.sb-v.blue{font-size:15px}
.sb-l{display:block;font-size:10.5px;color:var(--text4);margin-top:3px;font-weight:500}
.sb-div{width:1px;background:var(--border);align-self:stretch;margin:0 4px}

/* ═══════ REPORT ═══════ */
.rpt-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:600px){.rpt-kpi-grid{grid-template-columns:repeat(4,1fr)}}
.rpt-kpi{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);text-align:center}
.rk-v{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px}
.rk-l{font-size:11px;color:var(--text3);font-weight:500}
.rpt-kpi.blue .rk-v{color:var(--blue)}
.rpt-kpi.green .rk-v{color:var(--green-mid)}
.rpt-kpi.amber .rk-v{color:var(--amber-mid)}
.rpt-kpi.red .rk-v{color:var(--red-mid)}
.rpt-mini{background:#f8fafc;border-radius:10px;padding:12px;text-align:center;border:1px solid var(--border)}
.rpt-mini-v{font-size:20px;font-weight:800;color:var(--text);line-height:1;margin-bottom:3px}
.rpt-mini-v.green{color:var(--green-mid)}
.rpt-mini-l{font-size:11px;color:var(--text3)}
.rpt-cust-row{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.rpt-cust-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.rcr-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:6px;flex-wrap:wrap}
.rcr-name{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.rcr-pct{font-size:13px;font-weight:800;color:var(--text2)}
.rcr-pct.green{color:var(--green-mid)}
.rcr-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:4px}

/* ═══════ SETTINGS ═══════ */
.profile-card{display:flex;align-items:center;gap:16px;padding:20px}
.profile-avatar-wrap{position:relative;flex-shrink:0}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#1e40af,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;overflow:hidden}
.avatar-upload-btn{position:absolute;bottom:0;right:0;width:24px;height:24px;background:#1e40af;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;border:2px solid #fff;transition:background .15s}
.avatar-upload-btn:hover{background:#1d4ed8}
.profile-name{font-size:17px;font-weight:700;color:var(--text)}
.profile-role{font-size:12.5px;color:var(--text3);margin-top:2px;font-weight:500}
.profile-username{font-size:12px;color:var(--blue);font-family:monospace;margin-top:2px}
.setting-rows{}
.sr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:12px}
.sr.last{border-bottom:none}
.sr-lbl{font-size:13px;color:var(--text3);font-weight:500}
.sr-val{font-size:13px;font-weight:600;color:var(--text2);text-align:right}
.sr-val.mono{font-family:monospace;color:var(--blue)}
.setting-btn{padding:10px 16px;border-radius:var(--radius-xs);border:1.5px solid var(--border);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;background:#f8fafc;color:var(--text2);width:100%;text-align:left;transition:background .12s}
.setting-btn:hover{background:#f1f5f9}
.mini-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--blue);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--blue-light);color:var(--blue);transition:all .12s}
.user-list{display:flex;flex-direction:column;gap:0}
.user-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.user-row:last-child{border-bottom:none}
.ur-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1e40af,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0;overflow:hidden}
.ur-info{flex:1;min-width:0}
.ur-name{font-size:13.5px;font-weight:600;color:var(--text)}
.ur-meta{font-size:11.5px;color:var(--text3);margin-top:1px}
.ur-actions{display:flex;gap:6px}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.icon-btn:hover{background:#f1f5f9}
.icon-btn.danger:hover{background:var(--red-light);border-color:var(--red-mid)}
.danger-card{border:1.5px solid var(--red-mid)!important}
.danger-btn{width:100%;padding:11px;border-radius:var(--radius-xs);border:1.5px solid var(--red-mid);background:var(--red-light);color:var(--red);font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .12s}
.danger-btn:hover{background:#fca5a5}
.logout-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-xs);border:none;background:none;cursor:pointer;width:100%;color:var(--red);font-size:14px;font-weight:600;font-family:inherit;transition:background .12s}
.logout-btn:hover{background:var(--red-light)}

/* ═══════ MODAL ═══════ */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:300;display:none;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
@media(min-width:600px){.modal-overlay{align-items:center;padding:20px}}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom)+12px);animation:slideUp .22s cubic-bezier(.4,0,.2,1)}
@media(min-width:600px){.modal{border-radius:20px;max-height:85vh}}
@keyframes slideUp{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
.modal-handle{width:44px;height:5px;background:var(--border2);border-radius:3px;margin:14px auto 6px}
@media(min-width:600px){.modal-handle{display:none}}
.modal-hd{padding:8px 20px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.modal-title{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.2px}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:17px;color:var(--text3);display:flex;align-items:center;justify-content:center;line-height:1;transition:background .12s}
.modal-close:hover{background:var(--border)}
.modal-body{padding:18px 20px}
.modal-body .field{margin-bottom:14px}
.modal-body .field label{font-size:11.5px;font-weight:600;color:var(--text3);margin-bottom:5px}
.modal-body .field input,.modal-body .field select,.modal-body .field textarea{padding:11px 13px;font-size:14px}
.modal-body textarea{resize:none;height:76px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.modal-ft{padding:12px 20px 4px;display:flex;gap:10px;border-top:1px solid var(--border)}
.modal-btn{flex:1;padding:13px;border-radius:var(--radius-xs);border:1.5px solid var(--border);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .12s}
.modal-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.modal-btn.primary.danger{background:var(--red-mid);border-color:var(--red-mid)}
.modal-btn.secondary{background:#fff;color:var(--text2)}
.modal-btn:active{transform:scale(.97)}
.modal-err{font-size:12.5px;color:var(--red);background:var(--red-light);padding:8px 12px;border-radius:8px;margin-bottom:12px;border-left:3px solid var(--red-mid);display:none}

/* ═══════ FAB ═══════ */
#fabBtn{position:fixed;right:20px;bottom:calc(var(--nav-h) + 14px);width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 18px rgba(30,64,175,.45);display:none;align-items:center;justify-content:center;z-index:150;transition:transform .12s,box-shadow .15s}
#fabBtn:active{transform:scale(.93);box-shadow:0 2px 8px rgba(30,64,175,.35)}
@media(min-width:769px){#fabBtn{bottom:20px}}

/* ═══════ TOAST ═══════ */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);background:#1e293b;color:#fff;padding:11px 20px;border-radius:30px;font-size:13.5px;font-weight:500;z-index:400;opacity:0;transition:all .22s cubic-bezier(.4,0,.2,1);pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-md);max-width:calc(100vw - 40px);text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.live-toast{position:fixed;top:70px;right:16px;background:#1e293b;color:#fff;padding:10px 16px;border-radius:12px;font-size:12.5px;font-weight:500;z-index:400;opacity:0;transition:all .25s;pointer-events:none;max-width:260px;box-shadow:var(--shadow-md)}
.live-toast.show{opacity:1}
@media(min-width:769px){.toast{bottom:24px}.live-toast{top:74px;right:20px}}

/* ═══════ EMPTY STATE ═══════ */
.empty-state{text-align:center;padding:56px 24px;color:var(--text3)}
.empty-state svg{width:60px;height:60px;stroke-width:1.2;margin-bottom:14px;opacity:.35;stroke:var(--text3)}
.empty-state h3{font-size:16px;font-weight:700;color:var(--text2);margin-bottom:6px}
.empty-state p{font-size:13px;line-height:1.6;max-width:280px;margin:0 auto}

/* ═══════ MISC ═══════ */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.mono{font-family:monospace}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
</style>
</head>

<!-- TOASTS -->
<div class="toast" id="toast"></div>

<script>
''' + combined_js + '''

// Extra helpers
function fillLogin(u,p){ document.getElementById('loginUser').value=u; document.getElementById('loginPass').value=p; }
function showTab(tab){
  currentTab=tab;
  searchQ=''; filterStatus='all'; filterPriority='all';
  // Sidebar nav
  document.querySelectorAll('.nav-link').forEach(n=>n.classList.remove('active'));
  const sn=document.getElementById('nav-'+tab); if(sn) sn.classList.add('active');
  // Bottom nav
  document.querySelectorAll('.bn-item').forEach(n=>n.classList.remove('active'));
  const bn=document.getElementById('bn-'+tab); if(bn) bn.classList.add('active');
  const titles={dashboard:'Dashboard',dorDang:'Đơn dở dang',keHoach:'Kế hoạch sản xuất',hoanThanh:'Đơn hoàn thành',baoCao:'Báo cáo',settings:'Cài đặt & Tài khoản'};
  document.getElementById('pageTitle').textContent=titles[tab]||tab;
  document.getElementById('fabBtn').style.display=(tab==='dorDang'&&currentUser?.role==='admin')?'flex':'none';
  document.getElementById('mainContent').scrollTop=0;
  renderTab(tab);
  closeSidebar();
}
function updateBadges(){
  const n=DB.orders.filter(o=>!o.completed&&o.status!=='done').length;
  ['badgeDorDang','badgeDorDang2'].forEach(id=>{
    const b=document.getElementById(id);
    if(b){ b.textContent=n; b.style.display=n>0?'flex':'none'; }
  });
}
function updateAvatarBtn(){
  const btn=document.getElementById('avatarBtn');
  const sav=document.getElementById('sidebarAvatar');
  if(!btn||!currentUser) return;
  const initials=currentUser.name.split(' ').map(w=>w[0]).slice(-2).join('').toUpperCase();
  if(currentUser.avatar){
    btn.innerHTML=`<img src="${currentUser.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    btn.style.background='none';
    if(sav) sav.innerHTML=`<img src="${currentUser.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  } else {
    btn.textContent=initials; btn.style.background='';
    if(sav) sav.textContent=initials;
  }
  if(document.getElementById('sidebarName')) document.getElementById('sidebarName').textContent=currentUser.name;
  if(document.getElementById('sidebarRole')) document.getElementById('sidebarRole').textContent=currentUser.role==='admin'?'👑 Quản trị viên':'👤 Nhân viên';
}
// Service Worker
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
